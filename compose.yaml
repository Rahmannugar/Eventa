name: eventa

x-local-logging: &local-logging
  driver: json-file
  options:
    max-file: '2'
    max-size: 10m

services:
  identity-database:
    image: postgres:17-alpine
    env_file:
      - ./services/identity-service/.env
    ports:
      - '55432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - identity-database-data:/var/lib/postgresql/data
    logging: *local-logging

  notification-database:
    image: postgres:17-alpine
    env_file:
      - ./services/notification-service/.env
    ports:
      - '56432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - notification-database-data:/var/lib/postgresql/data
    logging: *local-logging

  api-gateway-redis:
    image: redis:7-alpine
    ports:
      - '56379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *local-logging

  identity-redis:
    image: redis:7-alpine
    ports:
      - '57379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *local-logging

  job-queue:
    image: rabbitmq:4.1-management-alpine
    env_file:
      - ./infrastructure/messaging/job-queue/rabbitmq/.env
    ports:
      - '5673:5672'
      - '15673:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - job-queue-data:/var/lib/rabbitmq
    logging: *local-logging

  identity-migration:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    image: eventa-identity-service:local
    command: ['node', 'dist/database/migrate.js']
    env_file:
      - ./services/identity-service/.env
    depends_on:
      identity-database:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: 'no'
    logging: *local-logging

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    image: eventa-identity-service:local
    env_file:
      - ./services/identity-service/.env
    ports:
      - '3005:3005'
      - '50051:50051'
    depends_on:
      identity-migration:
        condition: service_completed_successfully
      identity-redis:
        condition: service_healthy
      job-queue:
        condition: service_healthy
    restart: unless-stopped
    logging: *local-logging

  notification-migration:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    image: eventa-notification-service:local
    command: ['node', 'dist/database/migrate.js']
    env_file:
      - ./services/notification-service/.env
    depends_on:
      notification-database:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: 'no'
    logging: *local-logging

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    image: eventa-notification-service:local
    env_file:
      - ./services/notification-service/.env
    ports:
      - '3006:3006'
    depends_on:
      notification-migration:
        condition: service_completed_successfully
      job-queue:
        condition: service_healthy
    restart: unless-stopped
    logging: *local-logging

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    image: eventa-api-gateway:local
    env_file:
      - ./services/api-gateway/.env
    ports:
      - '3004:3004'
    depends_on:
      identity-service:
        condition: service_healthy
      api-gateway-redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *local-logging

  observability-collector:
    image: grafana/alloy:v1.16.1
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    ports:
      - '14317:4317'
      - '14318:4318'
      - '51234:12345'
    volumes:
      - ./infrastructure/observability/collector/grafana-alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      observability-logs:
        condition: service_started
      observability-metrics:
        condition: service_started
      observability-traces:
        condition: service_started
    restart: unless-stopped
    logging: *local-logging

  observability-metrics:
    image: prom/prometheus:v3.11.0
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=1d
      - --web.enable-otlp-receiver
    ports:
      - '59090:9090'
    volumes:
      - ./infrastructure/observability/metrics/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - observability-metrics-data:/prometheus
    restart: unless-stopped
    logging: *local-logging

  observability-traces:
    image: grafana/tempo:2.10.5
    command: ['-config.file=/etc/tempo/tempo.yaml']
    ports:
      - '53200:3200'
    volumes:
      - ./infrastructure/observability/traces/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - observability-traces-data:/var/tempo
    restart: unless-stopped
    logging: *local-logging

  observability-logs:
    build:
      context: ./infrastructure/observability/logs/loki
      dockerfile: Dockerfile
    image: eventa-observability-logs:local
    command: ['-config.file=/etc/loki/loki.yaml']
    ports:
      - '53100:3100'
    volumes:
      - ./infrastructure/observability/logs/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - observability-logs-data:/var/loki
    restart: unless-stopped
    logging: *local-logging

  observability-dashboard:
    image: grafana/grafana:13.1.0
    env_file:
      - ./infrastructure/observability/dashboards/grafana/.env
    ports:
      - '3300:3000'
    volumes:
      - ./infrastructure/observability/dashboards/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./infrastructure/observability/dashboards/grafana/provisioning/datasources/datasources.yaml:/etc/grafana/provisioning/datasources/eventa.yaml:ro
      - ./infrastructure/observability/dashboards/grafana/provisioning/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/eventa.yaml:ro
      - ./infrastructure/observability/dashboards/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - observability-dashboard-data:/var/lib/grafana
    depends_on:
      observability-logs:
        condition: service_started
      observability-metrics:
        condition: service_started
      observability-traces:
        condition: service_started
    restart: unless-stopped
    logging: *local-logging

volumes:
  identity-database-data:
  notification-database-data:
  job-queue-data:
  observability-dashboard-data:
  observability-logs-data:
  observability-metrics-data:
  observability-traces-data:
