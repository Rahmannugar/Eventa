name: eventa

services:
  identity-database:
    image: postgres:17-alpine
    env_file:
      - ./services/identity-service/.env
    ports:
      - '55432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - identity-database-data:/var/lib/postgresql/data

  api-gateway-redis:
    image: redis:7-alpine
    ports:
      - '56379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  identity-migration:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    image: eventa-identity-service:local
    command: ['node', 'dist/database/migrate.js']
    env_file:
      - ./services/identity-service/.env
    depends_on:
      identity-database:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: 'no'

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    image: eventa-identity-service:local
    env_file:
      - ./services/identity-service/.env
    ports:
      - '3005:3005'
      - '50051:50051'
    depends_on:
      identity-migration:
        condition: service_completed_successfully
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    image: eventa-api-gateway:local
    env_file:
      - ./services/api-gateway/.env
    ports:
      - '3004:3004'
    depends_on:
      identity-service:
        condition: service_healthy
      api-gateway-redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  identity-database-data:
